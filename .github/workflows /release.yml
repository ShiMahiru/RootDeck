name: Build and Draft Signed Release

on:
  push:
    tags:
      - 'v*'
  # 也支持在 GitHub 网页端手动点击 Run workflow 触发
  workflow_dispatch:
    inputs:
      version:
        description: '请输入本次发布的版本号 (必须包含 v，例如: v1.0.2)'
        required: true
        default: 'v1.0.2'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # 提前切换 JS Action 到 Node.js 24，避免 Node.js 20 弃用告警
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. 校验签名 Secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing=0
          for var in KEYSTORE_BASE64 KEY_ALIAS KEYSTORE_PASSWORD KEY_PASSWORD; do
            if [ -z "${!var:-}" ]; then
              echo "::error::缺少必填 Secret: $var"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          keystore_file="$(mktemp /tmp/rootdeck-keystore-XXXXXX.jks)"
          if ! printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_file"; then
            echo "::error::KEYSTORE_BASE64 不是有效的 Base64，请确认你上传的是 keystore 文件的 base64 内容。"
            exit 1
          fi

          if ! keytool -list -keystore "$keystore_file" -storepass "$KEYSTORE_PASSWORD" > /tmp/rootdeck-keystore-list.txt 2>/tmp/rootdeck-keystore-error.txt; then
            echo "::error::无法读取 keystore。请检查 KEYSTORE_BASE64 与 KEYSTORE_PASSWORD 是否匹配（日志见下）。"
            cat /tmp/rootdeck-keystore-error.txt
            exit 1
          fi

          if ! grep -F "$KEY_ALIAS" /tmp/rootdeck-keystore-list.txt >/dev/null; then
            echo "::error::在 keystore 中未找到 KEY_ALIAS=$KEY_ALIAS，请确认别名正确。"
            exit 1
          fi

      - name: 4. 赋予 Gradle 执行权限
        run: chmod +x gradlew

      - name: 5. 编译 Release 版 APK
        run: ./gradlew assembleRelease

      - name: 6. 自动签名 APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: '34.0.0'

      - name: 7. 使用手动输入版本号
        run: echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"

      - name: 8. 重命名已签名的 APK
        run: mv ${{ steps.sign_app.outputs.signedReleaseFile }} RootDeck-${{ env.VERSION }}-signed.apk

      - name: 9. 创建 GitHub Release 草稿
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: RootDeck-${{ env.VERSION }}-signed.apk
          draft: true
          generate_release_notes: true

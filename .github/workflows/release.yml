name: Build and Draft Signed Release

on:
  # 仅支持在 GitHub 网页端手动点击 Run workflow 触发
  workflow_dispatch:
    inputs:
      version:
        description: '请输入本次发布的版本号 (必须包含 v，例如: v1.0.2)'
        required: true
        default: 'v1.0.2'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # 提前切换 JS Action 到 Node.js 24，避免 Node.js 20 弃用告警
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v5

      - name: 2. 配置 JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. 校验签名 Secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing_vars=()
          for var in KEYSTORE_BASE64 KEY_ALIAS KEYSTORE_PASSWORD KEY_PASSWORD; do
            if [ -z "${!var:-}" ]; then
              missing_vars+=("$var")
            fi
          done

          if [ "${#missing_vars[@]}" -ne 0 ]; then
            joined_missing="$(IFS=', '; echo "${missing_vars[*]}")"
            echo "::error::缺少必填 Secrets: $joined_missing"
            {
              echo "### ❌ 发布签名配置缺失"
              echo ""
              echo "当前工作流需要以下仓库 Secrets 才能继续："
              for var in "${missing_vars[@]}"; do
                echo "- \`$var\`"
              done
              echo ""
              echo "请到 **Settings → Secrets and variables → Actions** 中补齐后重试。"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          keystore_file="$(mktemp /tmp/rootdeck-keystore-XXXXXX.jks)"
          if ! printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_file"; then
            echo "::error::KEYSTORE_BASE64 不是有效的 Base64，请确认你上传的是 keystore 文件的 base64 内容。"
            exit 1
          fi

          if ! keytool -list -keystore "$keystore_file" -storepass "$KEYSTORE_PASSWORD" > /tmp/rootdeck-keystore-list.txt 2>/tmp/rootdeck-keystore-error.txt; then
            echo "::error::无法读取 keystore。请检查 KEYSTORE_BASE64 与 KEYSTORE_PASSWORD 是否匹配（日志见下）。"
            cat /tmp/rootdeck-keystore-error.txt
            exit 1
          fi

          normalized_input_alias="$(printf '%s' "$KEY_ALIAS" | tr -d '\r\n' | tr '[:upper:]' '[:lower:]')"
          if [ -z "$normalized_input_alias" ]; then
            echo "::error::KEY_ALIAS 为空或只包含空白字符。"
            exit 1
          fi

          keystore_aliases="$(awk -F, 'NF {print tolower($1)}' /tmp/rootdeck-keystore-list.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if ! printf '%s\n' "$keystore_aliases" | grep -Fx "$normalized_input_alias" >/dev/null; then
            echo "::error::在 keystore 中未找到 KEY_ALIAS=$KEY_ALIAS，请确认别名正确。"
            echo "::notice::当前 keystore 中可见的别名如下（可能均为小写）："
            printf '%s\n' "$keystore_aliases"
            exit 1
          fi

      - name: 4. 赋予 Gradle 执行权限
        run: chmod +x gradlew

      - name: 5. 编译 Release 版 APK
        run: ./gradlew assembleRelease

      - name: 6. 自动签名 APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: '34.0.0'

      - name: 7. 使用手动输入版本号
        run: echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"

      - name: 8. 重命名已签名的 APK
        run: mv ${{ steps.sign_app.outputs.signedReleaseFile }} RootDeck-${{ env.VERSION }}-signed.apk

      - name: 9. 创建 GitHub Release 草稿
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: RootDeck-${{ env.VERSION }}-signed.apk
          draft: true
          generate_release_notes: true

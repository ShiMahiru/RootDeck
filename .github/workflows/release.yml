name: Build and Draft Signed Release

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      version:
        description: '请输入本次发布的版本号，例如: v1.3.0；留空则自动读取 app/build.gradle.kts 的 versionName'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. 设置并校验版本号
        shell: bash
        run: |
          set -euo pipefail

          APP_VERSION="$(sed -nE 's/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' app/build.gradle.kts | head -n 1)"

          if [ -z "$APP_VERSION" ]; then
            echo "::error::无法从 app/build.gradle.kts 读取 versionName"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_VERSION="${{ github.event.inputs.version || '' }}"

            if [ -z "$INPUT_VERSION" ]; then
              VERSION="v${APP_VERSION}"
            else
              VERSION="$INPUT_VERSION"
            fi
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          if [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+){1,3}(-[A-Za-z0-9._-]+)?$ ]]; then
            VERSION="v$VERSION"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+(\.[0-9]+){1,3}(-[A-Za-z0-9._-]+)?$ ]]; then
            echo "::error::版本号格式不正确：$VERSION，示例：v1.3.0"
            exit 1
          fi

          RELEASE_VERSION="${VERSION#v}"

          if [ "$APP_VERSION" != "$RELEASE_VERSION" ]; then
            echo "::error::源码 versionName=$APP_VERSION，但发布版本=$VERSION。请先同步 app/build.gradle.kts 的 versionName。"
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_APK_NAME=RootDeck-$VERSION-signed.apk" >> "$GITHUB_ENV"

          echo "发布版本：$VERSION"
          echo "源码版本：$APP_VERSION"

      - name: 4. 校验签名 Secrets 和 keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          for var in KEYSTORE_BASE64 KEY_ALIAS KEYSTORE_PASSWORD KEY_PASSWORD; do
            if [ -z "${!var:-}" ]; then
              echo "::error::缺少必填 Secret: $var"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          KEY_ALIAS_INPUT="$(printf '%s' "$KEY_ALIAS" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ -z "$KEY_ALIAS_INPUT" ]; then
            echo "::error::KEY_ALIAS 为空，请检查 GitHub Secrets"
            exit 1
          fi

          KEYSTORE_FILE="${RUNNER_TEMP}/rootdeck-release-key.jks"

          if ! printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_FILE"; then
            echo "::error::KEYSTORE_BASE64 不是有效的 Base64，请确认你上传的是 keystore 文件的 base64 内容。"
            exit 1
          fi

          if ! keytool -list -v -keystore "$KEYSTORE_FILE" -storepass "$KEYSTORE_PASSWORD" > /tmp/rootdeck-keystore-list.txt 2>/tmp/rootdeck-keystore-error.txt; then
            echo "::error::无法读取 keystore。请检查 KEYSTORE_BASE64 与 KEYSTORE_PASSWORD 是否匹配。"
            cat /tmp/rootdeck-keystore-error.txt
            exit 1
          fi

          AVAILABLE_ALIASES="$(sed -n 's/^Alias name: //p' /tmp/rootdeck-keystore-list.txt)"

          if [ -z "$AVAILABLE_ALIASES" ]; then
            echo "::error::keystore 中没有读取到任何 Alias"
            exit 1
          fi

          ACTUAL_ALIAS="$(printf '%s\n' "$AVAILABLE_ALIASES" | awk -v target="$KEY_ALIAS_INPUT" 'tolower($0) == tolower(target) { print; exit }')"

          if [ -z "$ACTUAL_ALIAS" ]; then
            echo "::error::在 keystore 中未找到 KEY_ALIAS=$KEY_ALIAS_INPUT"
            echo "当前 keystore 中可用 Alias："
            printf '%s\n' "$AVAILABLE_ALIASES" | sed 's/^/- /'
            exit 1
          fi

          if ! keytool -list -keystore "$KEYSTORE_FILE" -storepass "$KEYSTORE_PASSWORD" -alias "$ACTUAL_ALIAS" >/dev/null 2>/tmp/rootdeck-alias-error.txt; then
            echo "::error::无法使用 Alias 读取 keystore 条目。"
            cat /tmp/rootdeck-alias-error.txt
            exit 1
          fi

          echo "KEYSTORE_FILE=$KEYSTORE_FILE" >> "$GITHUB_ENV"
          echo "KEY_ALIAS_CLEAN=$ACTUAL_ALIAS" >> "$GITHUB_ENV"

          echo "keystore 校验通过"

      - name: 5. 赋予 Gradle 执行权限
        run: chmod +x gradlew

      - name: 6. 检查 Android Build Tools
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${ANDROID_HOME:-}" ]; then
            echo "::error::ANDROID_HOME 为空，无法找到 Android SDK"
            exit 1
          fi

          if [ ! -d "$ANDROID_HOME/build-tools" ]; then
            echo "::error::未找到 Android Build Tools 目录：$ANDROID_HOME/build-tools"
            exit 1
          fi

          echo "当前可用 Android Build Tools："
          find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V

          BUILD_TOOLS_DIR="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"

          if [ -z "$BUILD_TOOLS_DIR" ]; then
            echo "::error::未找到任何 Android Build Tools"
            exit 1
          fi

          if [ ! -x "$BUILD_TOOLS_DIR/zipalign" ]; then
            echo "::error::未找到 zipalign：$BUILD_TOOLS_DIR/zipalign"
            exit 1
          fi

          if [ ! -x "$BUILD_TOOLS_DIR/apksigner" ]; then
            echo "::error::未找到 apksigner：$BUILD_TOOLS_DIR/apksigner"
            exit 1
          fi

          echo "BUILD_TOOLS_DIR=$BUILD_TOOLS_DIR" >> "$GITHUB_ENV"
          echo "使用 Android Build Tools：$BUILD_TOOLS_DIR"

      - name: 7. 编译 Release 版 APK
        run: ./gradlew --no-daemon clean assembleRelease

      - name: 8. 对 APK 进行 zipalign 和签名
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          ZIPALIGN="${BUILD_TOOLS_DIR}/zipalign"
          APKSIGNER="${BUILD_TOOLS_DIR}/apksigner"

          mapfile -t APK_FILES < <(find app/build/outputs/apk/release -type f -name "*.apk" | sort)

          if [ "${#APK_FILES[@]}" -eq 0 ]; then
            echo "::error::未找到 Release APK"
            find app/build/outputs -type f || true
            exit 1
          fi

          UNSIGNED_APK="${APK_FILES[0]}"
          ALIGNED_APK="${RUNNER_TEMP}/RootDeck-${VERSION}-aligned.apk"

          echo "待签名 APK：$UNSIGNED_APK"
          echo "使用 Build Tools：$BUILD_TOOLS_DIR"

          "$ZIPALIGN" -p -f 4 "$UNSIGNED_APK" "$ALIGNED_APK"

          "$APKSIGNER" sign \
            --ks "$KEYSTORE_FILE" \
            --ks-key-alias "$KEY_ALIAS_CLEAN" \
            --ks-pass env:KEYSTORE_PASSWORD \
            --key-pass env:KEY_PASSWORD \
            --out "$RELEASE_APK_NAME" \
            "$ALIGNED_APK"

          "$APKSIGNER" verify --verbose "$RELEASE_APK_NAME"

          ls -lh "$RELEASE_APK_NAME"

      - name: 9. 上传 APK 到 Actions Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_APK_NAME }}
          path: ${{ env.RELEASE_APK_NAME }}

      - name: 10. 创建 GitHub Release 草稿
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          target_commitish: ${{ github.sha }}
          files: ${{ env.RELEASE_APK_NAME }}
          draft: true
          generate_release_notes: true

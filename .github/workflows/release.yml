name: Build and Draft Signed Release

on:
  # 仅允许在 GitHub 网页端手动点击 Run workflow 触发
  workflow_dispatch:
    inputs:
      version:
        description: '请输入本次发布的版本号 (必须包含 v，例如: v1.0.2)'
        required: true
        default: 'v1.0.2'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. 赋予 Gradle 执行权限
        run: chmod +x gradlew

      - name: 4. 编译 Release 版 APK
        run: ./gradlew assembleRelease

      - name: 5. 自动签名 APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: '34.0.0'

      - name: 6. 使用手动输入版本号
        run: echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV

      - name: 7. 重命名已签名的 APK
        run: mv ${{ steps.sign_app.outputs.signedReleaseFile }} RootDeck-${{ env.VERSION }}-signed.apk

      - name: 8. 创建 GitHub Release 草稿
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: RootDeck-${{ env.VERSION }}-signed.apk
          draft: true
          generate_release_notes: true
